# ABOVSemiconductor A34M418 Starter Kit (starterkit-a34m418-yln-a)

source [find interface/cmsis-dap.cfg]

# usb vendor / product id
cmsis_dap_vid_pid 0x1a29 0xa804

# working area buffer size
set WORKAREASIZE 0x10000

# chipset name
set CHIPNAME a34m418

# enable swd transport interface
transport select swd

source [find target/abov32v3.cfg]

$_TARGETNAME configure -event reset-assert-pre {
    # need nReset by cmsis-dap swj command
    cmsis-dap cmd 0x10 0x0 0x80 0
    cmsis-dap cmd 0x10 0x80 0x80 0
}
