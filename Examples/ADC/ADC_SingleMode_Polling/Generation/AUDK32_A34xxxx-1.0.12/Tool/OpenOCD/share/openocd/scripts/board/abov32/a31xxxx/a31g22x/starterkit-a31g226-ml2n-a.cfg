#
# ABOVSemiconductor A31G226 Starter Kit (starterkit-a31g226-ml2n-a)

source [find interface/cmsis-dap.cfg]

# usb vendor / product id
cmsis_dap_vid_pid 0x1a29 0xa807

# working area buffer size
set WORKAREASIZE 0x2000

# chipset name
set CHIPNAME a31g226

# enable swd transport interface
transport select swd

source [find target/abov32v2.cfg]
